<h2 class="sr-only">Health Tracker — log blood pressure and vital signs</h2>

<style>
  .ht { font-family: var(--font-sans); padding: 1rem 0; color: #E6ECF5; }
  .ht * { box-sizing: border-box; }
  .ht-shell { background: #0F1B2D; border-radius: 16px; padding: 18px 16px 20px; border: 1px solid #1B2A44; }
  .ht-head { padding: 4px 4px 14px; border-bottom: 1px solid #1B2A44; margin-bottom: 16px; }
  .ht-title { font-size: 18px; font-weight: 500; margin: 0 0 4px; color: #E6ECF5; letter-spacing: -0.01em; }
  .ht-sub { font-size: 13px; color: #8FA3C4; margin: 0; }
  .ht-brand { font-size: 11px; font-weight: 500; color: #6FA8FF; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 8px; }

  .ht-card { background: #15243B; border: 1px solid #1F314F; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .ht-h { font-size: 15px; font-weight: 500; margin: 0 0 14px; color: #E6ECF5; }

  .ht-field { margin-bottom: 12px; }
  .ht-label { display: block; font-size: 13px; color: #8FA3C4; margin-bottom: 6px; font-weight: 400; }

  .ht-input, .ht-textarea {
    width: 100%; min-height: 46px; padding: 10px 12px; font-size: 16px; font-family: var(--font-sans);
    color: #E6ECF5; background: #0F1B2D; border: 1px solid #2A3D5F; border-radius: 10px;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s; -webkit-appearance: none; appearance: none;
  }
  .ht-input:focus, .ht-textarea:focus { border-color: #4D8BFF; box-shadow: 0 0 0 3px rgba(77,139,255,0.18); }
  .ht-input::placeholder, .ht-textarea::placeholder { color: #5C7090; }
  .ht-input::-webkit-date-and-time-value { text-align: left; }
  input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .ht-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .ht-bp { display: flex; align-items: center; gap: 10px; }
  .ht-bp .ht-input { text-align: center; font-size: 18px; font-weight: 500; padding: 10px 8px; }
  .ht-sep { font-size: 22px; color: #5C7090; font-weight: 300; }

  .ht-textarea { min-height: 92px; resize: none; line-height: 1.5; overflow: hidden; }

  .ht-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; min-height: 50px; padding: 12px 18px; font-size: 16px; font-weight: 500;
    color: #FFFFFF; background: #2563EB; border: 1px solid #2563EB; border-radius: 12px;
    cursor: pointer; font-family: var(--font-sans); letter-spacing: 0.01em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 2px 6px rgba(37,99,235,0.35);
    transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
  }
  .ht-btn:hover { background: #1E55D6; box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 10px rgba(37,99,235,0.45); }
  .ht-btn:active { transform: translateY(1px); }
  .ht-btn-secondary {
    background: transparent; color: #B8C7E2; border: 1px solid #2A3D5F; box-shadow: none; min-height: 44px; font-size: 14px;
  }
  .ht-btn-secondary:hover { background: #1A2A45; color: #E6ECF5; box-shadow: none; }
  .ht-btn-danger { background: transparent; color: #F08D8D; border-color: #4A2A35; box-shadow: none; }
  .ht-btn-danger:hover { background: #2A1A24; color: #FFB3B3; }

  .ht-list-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ht-count { font-size: 12px; color: #8FA3C4; background: #0F1B2D; padding: 3px 8px; border-radius: 999px; border: 1px solid #2A3D5F; }

  .ht-list { list-style: none; padding: 0; margin: 0; }
  .ht-item { padding: 12px 0; border-bottom: 1px solid #1F314F; }
  .ht-item:last-child { border-bottom: none; }
  .ht-item-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .ht-item-main { flex: 1; min-width: 0; }
  .ht-item-val { font-size: 17px; font-weight: 500; color: #E6ECF5; font-variant-numeric: tabular-nums; }
  .ht-item-pulse { font-size: 13px; color: #8FA3C4; margin-left: 8px; font-weight: 400; }
  .ht-item-time { font-size: 12px; color: #8FA3C4; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .ht-item-desc { font-size: 13px; color: #B8C7E2; margin-top: 6px; line-height: 1.45; overflow-wrap: anywhere; }
  .ht-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ht-icon-btn {
    width: 36px; height: 36px; border-radius: 9px; background: transparent; border: 1px solid #2A3D5F;
    color: #8FA3C4; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .ht-icon-btn:hover { background: #1A2A45; color: #E6ECF5; border-color: #3D5478; }
  .ht-icon-btn svg { width: 16px; height: 16px; }
  .ht-icon-btn.danger:hover { color: #F08D8D; border-color: #4A2A35; background: #2A1A24; }

  .ht-empty { font-size: 13px; color: #6F84A6; text-align: center; padding: 20px 0; }

  .ht-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .ht-stat { background: #0F1B2D; border: 1px solid #1F314F; border-radius: 10px; padding: 10px 12px; }
  .ht-stat-label { font-size: 11px; color: #8FA3C4; text-transform: uppercase; letter-spacing: 0.05em; }
  .ht-stat-val { font-size: 17px; font-weight: 500; color: #E6ECF5; font-variant-numeric: tabular-nums; margin-top: 2px; }

  .ht-export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ht-export-grid .ht-btn-secondary { min-height: 48px; }

  .ht-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #2563EB; color: #FFFFFF; font-size: 14px; padding: 10px 18px; border-radius: 999px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 50;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .ht-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .ht-shell { padding: 14px 12px 16px; border-radius: 14px; }
    .ht-card { padding: 14px; }
    .ht-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .ht-stat { padding: 8px 10px; }
  }
</style>

<div class="ht">
  <div class="ht-shell">

    <div class="ht-head">
      <p class="ht-brand">Bulut Projects</p>
      <h3 class="ht-title">Health Tracker</h3>
      <p class="ht-sub">Log blood pressure and vital signs</p>
    </div>

    <div class="ht-card">
      <p class="ht-h" id="ht-form-title">New entry</p>

      <div class="ht-grid2">
        <div class="ht-field">
          <label class="ht-label" for="ht-date">Date</label>
          <input type="date" id="ht-date" class="ht-input" />
        </div>
        <div class="ht-field">
          <label class="ht-label" for="ht-time">Time</label>
          <input type="time" id="ht-time" class="ht-input" />
        </div>
      </div>

      <div class="ht-field">
        <label class="ht-label">Blood pressure (mmHg)</label>
        <div class="ht-bp">
          <input type="number" id="ht-sys" class="ht-input" min="0" max="300" placeholder="120" inputmode="numeric" />
          <span class="ht-sep">/</span>
          <input type="number" id="ht-dia" class="ht-input" min="0" max="999" placeholder="80" inputmode="numeric" />
        </div>
      </div>

      <div class="ht-field">
        <label class="ht-label" for="ht-pulse">Pulse (optional)</label>
        <input type="number" id="ht-pulse" class="ht-input" min="0" max="300" placeholder="bpm" inputmode="numeric" />
      </div>

      <div class="ht-field">
        <label class="ht-label" for="ht-desc">Note (optional)</label>
        <input type="text" id="ht-desc" class="ht-input" placeholder="e.g. morning, before medication" />
      </div>

      <button id="ht-add" class="ht-btn">Add entry</button>
      <button id="ht-cancel-edit" class="ht-btn ht-btn-secondary" style="display: none; margin-top: 8px;">Cancel edit</button>
    </div>

    <div class="ht-card">
      <div class="ht-list-head">
        <p class="ht-h" style="margin: 0;">Entries <span class="ht-count" id="ht-count">0</span></p>
        <button id="ht-clear" class="ht-btn ht-btn-secondary ht-btn-danger" style="width: auto; padding: 6px 12px; min-height: 32px; font-size: 12px;">Clear all</button>
      </div>

      <div class="ht-stats" id="ht-stats" style="display: none;">
        <div class="ht-stat"><div class="ht-stat-label">Avg sys</div><div class="ht-stat-val" id="ht-avg-sys">—</div></div>
        <div class="ht-stat"><div class="ht-stat-label">Avg dia</div><div class="ht-stat-val" id="ht-avg-dia">—</div></div>
        <div class="ht-stat"><div class="ht-stat-label">Avg pulse</div><div class="ht-stat-val" id="ht-avg-pulse">—</div></div>
      </div>

      <ul class="ht-list" id="ht-list"></ul>
      <div class="ht-empty" id="ht-empty">No entries yet. Add your first reading above.</div>
    </div>

    <div class="ht-card">
      <p class="ht-h">Notes</p>
      <textarea id="ht-notes" class="ht-textarea" rows="3" placeholder="General notes — area expands as you type."></textarea>
    </div>

    <div class="ht-card">
      <p class="ht-h">Export &amp; backup</p>
      <div class="ht-export-grid">
        <button id="ht-pdf" class="ht-btn ht-btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          PDF
        </button>
        <button id="ht-xlsx" class="ht-btn ht-btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Excel
        </button>
        <button id="ht-json-save" class="ht-btn ht-btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
        <button id="ht-json-load" class="ht-btn ht-btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload
        </button>
      </div>
      <input type="file" id="ht-file" accept="application/json,.json" style="display: none;" />
    </div>

  </div>

  <div class="ht-toast" id="ht-toast">OK</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  let records = [];
  let notes = '';
  let editingId = null;

  const $ = (id) => document.getElementById(id);
  const dateEl = $('ht-date'), timeEl = $('ht-time'), sysEl = $('ht-sys'), diaEl = $('ht-dia'), pulseEl = $('ht-pulse'), descEl = $('ht-desc');
  const addBtn = $('ht-add'), cancelEditBtn = $('ht-cancel-edit');
  const listEl = $('ht-list'), emptyEl = $('ht-empty'), countEl = $('ht-count');
  const notesEl = $('ht-notes');
  const toastEl = $('ht-toast');
  const statsEl = $('ht-stats');
  const formTitleEl = $('ht-form-title');

  function pad(n){ return String(n).padStart(2,'0'); }
  function setNow(){
    const d = new Date();
    dateEl.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    timeEl.value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function fmtDateTime(dateStr, timeStr){
    if (!dateStr) return '';
    const [y,m,d] = dateStr.split('-');
    return `${d}.${m}.${y} · ${timeStr || ''}`.trim();
  }

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove('show'), 1700);
  }

  function autosize(el){
    el.style.height = 'auto';
    el.style.height = (el.scrollHeight + 2) + 'px';
  }

  function sortRecords(){
    records.sort((a,b) => {
      const ka = (a.date||'') + 'T' + (a.time||'00:00');
      const kb = (b.date||'') + 'T' + (b.time||'00:00');
      return kb.localeCompare(ka);
    });
  }

  function renderStats(){
    if (records.length === 0) { statsEl.style.display = 'none'; return; }
    statsEl.style.display = 'grid';
    const sys = records.map(r => r.sys).filter(v => Number.isFinite(v));
    const dia = records.map(r => r.dia).filter(v => Number.isFinite(v));
    const pulse = records.map(r => r.pulse).filter(v => Number.isFinite(v));
    const avg = (arr) => arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
    $('ht-avg-sys').textContent = avg(sys) ?? '—';
    $('ht-avg-dia').textContent = avg(dia) ?? '—';
    $('ht-avg-pulse').textContent = avg(pulse) ?? '—';
  }

  function iconEdit(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  }
  function iconDelete(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>';
  }

  function render(){
    sortRecords();
    listEl.innerHTML = '';
    countEl.textContent = records.length;
    emptyEl.style.display = records.length === 0 ? 'block' : 'none';
    records.forEach(r => {
      const li = document.createElement('li');
      li.className = 'ht-item';
      const row = document.createElement('div'); row.className = 'ht-item-row';

      const main = document.createElement('div'); main.className = 'ht-item-main';
      const val = document.createElement('div'); val.className = 'ht-item-val';
      val.textContent = `${r.sys}/${r.dia} mmHg`;
      if (Number.isFinite(r.pulse)) {
        const ps = document.createElement('span'); ps.className = 'ht-item-pulse';
        ps.textContent = `· ${r.pulse} bpm`;
        val.appendChild(ps);
      }
      const time = document.createElement('div'); time.className = 'ht-item-time';
      time.textContent = fmtDateTime(r.date, r.time);
      main.appendChild(val); main.appendChild(time);
      if (r.desc) {
        const desc = document.createElement('div'); desc.className = 'ht-item-desc';
        desc.textContent = r.desc;
        main.appendChild(desc);
      }

      const actions = document.createElement('div'); actions.className = 'ht-item-actions';
      const editBtn = document.createElement('button'); editBtn.className = 'ht-icon-btn'; editBtn.title = 'Edit'; editBtn.setAttribute('aria-label','Edit');
      editBtn.innerHTML = iconEdit();
      editBtn.addEventListener('click', () => startEdit(r.id));
      const delBtn = document.createElement('button'); delBtn.className = 'ht-icon-btn danger'; delBtn.title = 'Delete'; delBtn.setAttribute('aria-label','Delete');
      delBtn.innerHTML = iconDelete();
      delBtn.addEventListener('click', () => removeRecord(r.id));
      actions.appendChild(editBtn); actions.appendChild(delBtn);

      row.appendChild(main); row.appendChild(actions);
      li.appendChild(row);
      listEl.appendChild(li);
    });
    renderStats();
  }

  function readForm(){
    const sys = parseInt(sysEl.value, 10);
    const dia = parseInt(diaEl.value, 10);
    const pulse = pulseEl.value === '' ? null : parseInt(pulseEl.value, 10);
    if (!Number.isFinite(sys) || !Number.isFinite(dia)) return null;
    if (sys <= 0 || dia <= 0) return null;
    return {
      date: dateEl.value,
      time: timeEl.value,
      sys, dia,
      pulse: Number.isFinite(pulse) ? pulse : null,
      desc: descEl.value.trim()
    };
  }

  function clearForm(){
    sysEl.value = ''; diaEl.value = ''; pulseEl.value = ''; descEl.value = '';
    setNow();
    editingId = null;
    addBtn.textContent = 'Add entry';
    formTitleEl.textContent = 'New entry';
    cancelEditBtn.style.display = 'none';
  }

  function startEdit(id){
    const r = records.find(x => x.id === id);
    if (!r) return;
    editingId = id;
    dateEl.value = r.date; timeEl.value = r.time;
    sysEl.value = r.sys; diaEl.value = r.dia;
    pulseEl.value = r.pulse ?? '';
    descEl.value = r.desc || '';
    addBtn.textContent = 'Save changes';
    formTitleEl.textContent = 'Edit entry';
    cancelEditBtn.style.display = '';
    sysEl.focus();
    sysEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function removeRecord(id){
    if (!confirm('Delete this entry?')) return;
    records = records.filter(r => r.id !== id);
    render();
    toast('Entry deleted');
  }

  addBtn.addEventListener('click', () => {
    const data = readForm();
    if (!data) { alert('Please enter both systolic and diastolic values.'); return; }
    if (editingId) {
      const idx = records.findIndex(r => r.id === editingId);
      if (idx >= 0) records[idx] = { ...records[idx], ...data };
      toast('Entry updated');
    } else {
      records.push({ id: uid(), ...data });
      toast('Entry added');
    }
    clearForm();
    render();
  });

  cancelEditBtn.addEventListener('click', clearForm);

  $('ht-clear').addEventListener('click', () => {
    if (records.length === 0) return;
    if (!confirm('Delete all entries? This cannot be undone.')) return;
    records = [];
    render();
    toast('All entries cleared');
  });

  notesEl.addEventListener('input', () => {
    notes = notesEl.value;
    autosize(notesEl);
  });
  setTimeout(() => autosize(notesEl), 0);

  // ---------- Export: PDF ----------
  $('ht-pdf').addEventListener('click', async () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'pt', format: 'a4' });
      try {
        const fontUrl = 'https://cdnjs.cloudflare.com/ajax/libs/dejavu-sans/1.0.0/fonts/dejavu-sans.ttf';
        const buf = await fetch(fontUrl).then(r => { if(!r.ok) throw new Error('font'); return r.arrayBuffer(); });
        const bytes = new Uint8Array(buf);
        let bin = ''; for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
        const b64 = btoa(bin);
        doc.addFileToVFS('DejaVuSans.ttf', b64);
        doc.addFont('DejaVuSans.ttf', 'DejaVuSans', 'normal');
        doc.setFont('DejaVuSans');
      } catch (e) {
        doc.setFont('helvetica');
      }
      doc.setFontSize(16);
      doc.text('Health Tracker — Blood pressure log', 40, 50);
      doc.setFontSize(10);
      const today = new Date();
      doc.text(`Generated: ${today.toLocaleString()}`, 40, 68);

      const head = [['Date', 'Time', 'Sys', 'Dia', 'Pulse', 'Note']];
      const sorted = [...records].sort((a,b) => {
        const ka = (a.date||'') + 'T' + (a.time||'00:00');
        const kb = (b.date||'') + 'T' + (b.time||'00:00');
        return kb.localeCompare(ka);
      });
      const body = sorted.map(r => {
        const [y,m,d] = (r.date||'').split('-');
        const dStr = (y && m && d) ? `${d}.${m}.${y}` : '';
        return [dStr, r.time||'', String(r.sys), String(r.dia), Number.isFinite(r.pulse) ? String(r.pulse) : '', r.desc || ''];
      });
      doc.autoTable({
        head, body,
        startY: 84,
        styles: { font: doc.getFont().fontName, fontSize: 10, cellPadding: 6 },
        headStyles: { fillColor: [240,240,240], textColor: 20, font: doc.getFont().fontName, fontStyle: 'normal' },
        columnStyles: { 5: { cellWidth: 180 } }
      });
      let y = doc.lastAutoTable.finalY ? doc.lastAutoTable.finalY + 24 : 100;
      if (notes && notes.trim()) {
        if (y > 720) { doc.addPage(); y = 50; }
        doc.setFontSize(12);
        doc.text('Notes', 40, y); y += 16;
        doc.setFontSize(10);
        const lines = doc.splitTextToSize(notes, 515);
        doc.text(lines, 40, y);
      }
      doc.save(`health_tracker_${today.toISOString().slice(0,10)}.pdf`);
      toast('PDF downloaded');
    } catch (e) {
      console.error(e);
      alert('Could not generate PDF.');
    }
  });

  // ---------- Export: XLSX ----------
  $('ht-xlsx').addEventListener('click', () => {
    try {
      const sorted = [...records].sort((a,b) => {
        const ka = (a.date||'') + 'T' + (a.time||'00:00');
        const kb = (b.date||'') + 'T' + (b.time||'00:00');
        return kb.localeCompare(ka);
      });
      const rows = sorted.map(r => {
        const [y,m,d] = (r.date||'').split('-');
        const dStr = (y && m && d) ? `${d}.${m}.${y}` : '';
        return {
          'Date': dStr,
          'Time': r.time || '',
          'Systolic (mmHg)': r.sys,
          'Diastolic (mmHg)': r.dia,
          'Pulse (bpm)': Number.isFinite(r.pulse) ? r.pulse : '',
          'Note': r.desc || ''
        };
      });
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ 'Date':'', 'Time':'', 'Systolic (mmHg)':'', 'Diastolic (mmHg)':'', 'Pulse (bpm)':'', 'Note':'' }]);
      ws['!cols'] = [{wch:12},{wch:8},{wch:16},{wch:16},{wch:10},{wch:40}];
      XLSX.utils.book_append_sheet(wb, ws, 'Entries');
      if (notes && notes.trim()) {
        const wsN = XLSX.utils.aoa_to_sheet([['Notes'], ...notes.split('\n').map(l => [l])]);
        wsN['!cols'] = [{wch:80}];
        XLSX.utils.book_append_sheet(wb, wsN, 'Notes');
      }
      const today = new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb, `health_tracker_${today}.xlsx`);
      toast('Excel downloaded');
    } catch (e) {
      console.error(e);
      alert('Could not generate Excel file.');
    }
  });

  // ---------- JSON save / upload ----------
  $('ht-json-save').addEventListener('click', () => {
    const payload = { version: 1, exportedAt: new Date().toISOString(), records, notes };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `health_tracker_backup_${today}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Backup saved');
  });

  $('ht-json-load').addEventListener('click', () => $('ht-file').click());
  $('ht-file').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.records)) throw new Error('format');
        const ok = confirm(`Load ${data.records.length} entries from backup? Current data will be replaced.`);
        if (!ok) return;
        records = data.records.map(r => ({
          id: r.id || uid(),
          date: r.date || '',
          time: r.time || '',
          sys: Number(r.sys),
          dia: Number(r.dia),
          pulse: (r.pulse === null || r.pulse === undefined || r.pulse === '') ? null : Number(r.pulse),
          desc: r.desc || ''
        })).filter(r => Number.isFinite(r.sys) && Number.isFinite(r.dia));
        notes = typeof data.notes === 'string' ? data.notes : '';
        notesEl.value = notes;
        autosize(notesEl);
        render();
        toast('Backup loaded');
      } catch (err) {
        alert('Invalid JSON file.');
      } finally {
        e.target.value = '';
      }
    };
    reader.readAsText(file, 'utf-8');
  });

  setNow();
  render();
})();
</script>
