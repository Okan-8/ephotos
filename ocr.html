<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OCR — Bulut Projects</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',sans-serif;background:#111;color:#fff;display:flex;flex-direction:column;}
.topbar{background:#1a2a4a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar h1{font-size:15px;font-weight:700;}
.topbar button{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;}
.tabs{background:#0d1b35;padding:6px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0;}
.tab{padding:6px 14px;border:1.5px solid rgba(255,255,255,.3);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#fff;}
.tab.on{background:#27ae60;border-color:#27ae60;}
.tab:disabled{opacity:0.5;cursor:not-allowed;}
.hint{color:rgba(255,255,255,.5);font-size:10px;margin-left:6px;}
.imgwrap{flex:1;overflow:auto;background:#111;display:flex;align-items:flex-start;justify-content:center;padding:10px;position:relative;}
#ocrImg{max-width:100%;height:auto;display:block;user-select:text;-webkit-user-select:text;}
#selCanvas{position:absolute;top:0;left:0;display:none;touch-action:none;}
.textwrap{display:none;flex-direction:column;flex:1;min-height:0;}
.textwrap .label{padding:6px 10px;background:#0d1b35;font-size:11px;color:rgba(255,255,255,.6);flex-shrink:0;}
#ocrText{flex:1;background:#1a1a1a;color:#fff;border:none;padding:12px;font-size:13px;font-family:'Segoe UI',sans-serif;resize:none;outline:none;line-height:1.7;}
.textftr{padding:6px 10px;background:#0d1b35;display:flex;gap:8px;flex-shrink:0;}
.textftr button{flex:1;padding:9px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-copy{background:#27ae60;color:#fff;}
.btn-back{background:rgba(255,255,255,.15);color:#fff;}
#status{display:none;padding:10px;text-align:center;font-size:12px;color:rgba(255,255,255,.7);background:#0d1b35;flex-shrink:0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;opacity:.5;}
.empty p{font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 OCR — Metin Tanıma</h1>
  <button onclick="window.close()">✕ Kapat</button>
</div>

<div class="tabs" id="tabs" style="display:none;">
  <button class="tab" id="tabFull" onclick="scanFullPage()">🗒 Tam Sayfa</button>
  <button class="tab" id="tabArea" onclick="enableAreaSelection()">✂️ Alan Seç</button>
  <span class="hint" id="hint">⬅️ Tarama başlatmak için butona tıkla</span>
</div>

<div class="imgwrap" id="imgwrap">
  <div class="empty" id="emptyMsg">
    <p>Görüntü bulunamadı.</p>
    <p style="font-size:11px;">Scanner'dan Edit → OCR butonunu kullan.</p>
  </div>
  <img id="ocrImg" style="display:none;" alt="OCR">
  <canvas id="selCanvas"></canvas>
</div>

<div class="textwrap" id="textwrap">
  <div class="label">Tanınan metin — seçip kopyalayabilirsin</div>
  <textarea id="ocrText" readonly></textarea>
  <div class="textftr">
    <button class="btn-back" onclick="showImage()">← Görüntüye Dön</button>
    <button class="btn-copy" onclick="copyText()">📋 Tümünü Kopyala</button>
  </div>
</div>

<div id="status"></div>

<script>
const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
let imageDataUrl=null;
let areaSelectionActive=false;
let selecting=false, sx=0,sy=0,ex=0,ey=0;

// Load image from sessionStorage
window.addEventListener('load',()=>{
  const data=sessionStorage.getItem('ocr_image');
  if(!data){return;}
  imageDataUrl=data;
  document.getElementById('emptyMsg').style.display='none';
  document.getElementById('tabs').style.display='flex';
  const img=document.getElementById('ocrImg');
  img.style.display='block';
  img.src=data;
  showImage();
});

function showImage(){
  document.getElementById('imgwrap').style.display='flex';
  document.getElementById('textwrap').style.display='none';
  const img=document.getElementById('ocrImg');
  if(img && imageDataUrl) {
    img.src=imageDataUrl;
    img.style.display='block';
  }
  // Alan seçimini devre dışı bırak
  disableAreaSelection();
}

// Tam sayfa tarama
async function scanFullPage() {
  if(!imageDataUrl) {
    setStatus('❌ Görüntü bulunamadı!');
    return;
  }
  
  // Buton görünümünü güncelle
  document.getElementById('tabFull').classList.add('on');
  document.getElementById('tabArea').classList.remove('on');
  disableAreaSelection();
  
  if(isSafari) {
    document.getElementById('hint').textContent='Görsele uzun bas → metni seç';
    setStatus('📱 Görsele uzun basın ve "Metni Seç" seçeneğini kullanın');
    setTimeout(()=>setStatus(''),3000);
  } else {
    await runTesseract(imageDataUrl);
  }
}

// Alan seçim modunu aktifleştir
function enableAreaSelection() {
  if(!imageDataUrl) return;
  
  areaSelectionActive = true;
  document.getElementById('tabArea').classList.add('on');
  document.getElementById('tabFull').classList.remove('on');
  document.getElementById('hint').textContent='✂️ Metin alanını mouse/parmak ile çiz, bırakınca otomatik taranır';
  
  // Önce görüntüyü göster
  showImage();
  
  // Canvas'ı başlat
  initSelCanvas();
}

// Alan seçim modunu devre dışı bırak
function disableAreaSelection() {
  areaSelectionActive = false;
  const canvas = document.getElementById('selCanvas');
  if(canvas) canvas.style.display = 'none';
}

/* ── Area selection ── */
function initSelCanvas(){
  const img = document.getElementById('ocrImg');
  const sc = document.getElementById('selCanvas');
  
  function resize(){
    const rect = img.getBoundingClientRect();
    const wrapRect = document.getElementById('imgwrap').getBoundingClientRect();
    sc.width = img.offsetWidth;
    sc.height = img.offsetHeight;
    sc.style.width = img.offsetWidth + 'px';
    sc.style.height = img.offsetHeight + 'px';
    sc.style.left = (rect.left - wrapRect.left) + 'px';
    sc.style.top = (rect.top - wrapRect.top) + 'px';
    sc.style.display = 'block';
  }
  
  if(img.complete && img.naturalWidth) resize();
  else img.onload = resize;
  
  window.addEventListener('resize', resize);
  
  function getPos(e){
    const rect = sc.getBoundingClientRect();
    let cx, cy;
    if(e.touches) {
      cx = e.touches[0].clientX;
      cy = e.touches[0].clientY;
    } else {
      cx = e.clientX;
      cy = e.clientY;
    }
    return { x: cx - rect.left, y: cy - rect.top };
  }
  
  function drawSelection(){
    const ctx = sc.getContext('2d');
    ctx.clearRect(0, 0, sc.width, sc.height);
    // Yarı saydam koyu overlay
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, sc.width, sc.height);
    
    const x = Math.min(sx, ex);
    const y = Math.min(sy, ey);
    const w = Math.abs(ex - sx);
    const h = Math.abs(ey - sy);
    
    // Seçili alanı temizle (saydam yap)
    ctx.clearRect(x, y, w, h);
    
    // Kesikli çizgi ile çevrele
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    
    // Küçük tutma noktaları
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(x-3, y-3, 6, 6);
    ctx.fillRect(x+w-3, y-3, 6, 6);
    ctx.fillRect(x-3, y+h-3, 6, 6);
    ctx.fillRect(x+w-3, y+h-3, 6, 6);
  }
  
  // Event listeners
  const newCanvas = sc.cloneNode(false);
  sc.parentNode.replaceChild(newCanvas, sc);
  const canvas = document.getElementById('selCanvas');
  canvas.style.cssText = sc.style.cssText;
  canvas.width = sc.width;
  canvas.height = sc.height;
  
  canvas.addEventListener('mousedown', (e) => {
    if(!areaSelectionActive) return;
    e.preventDefault();
    const pos = getPos(e);
    sx = pos.x;
    sy = pos.y;
    ex = pos.x;
    ey = pos.y;
    selecting = true;
  });
  
  canvas.addEventListener('mousemove', (e) => {
    if(!selecting || !areaSelectionActive) return;
    e.preventDefault();
    const pos = getPos(e);
    ex = Math.min(Math.max(pos.x, 0), canvas.width);
    ey = Math.min(Math.max(pos.y, 0), canvas.height);
    drawSelection();
  });
  
  canvas.addEventListener('mouseup', () => {
    if(!selecting || !areaSelectionActive) return;
    selecting = false;
    cropAndOcr();
  });
  
  // Mobil touch events
  canvas.addEventListener('touchstart', (e) => {
    if(!areaSelectionActive) return;
    e.preventDefault();
    const pos = getPos(e);
    sx = pos.x;
    sy = pos.y;
    ex = pos.x;
    ey = pos.y;
    selecting = true;
  }, {passive: false});
  
  canvas.addEventListener('touchmove', (e) => {
    if(!selecting || !areaSelectionActive) return;
    e.preventDefault();
    const pos = getPos(e);
    ex = Math.min(Math.max(pos.x, 0), canvas.width);
    ey = Math.min(Math.max(pos.y, 0), canvas.height);
    drawSelection();
  }, {passive: false});
  
  canvas.addEventListener('touchend', (e) => {
    if(!selecting || !areaSelectionActive) return;
    e.preventDefault();
    selecting = false;
    cropAndOcr();
  });
}

function cropAndOcr(){
  const img = document.getElementById('ocrImg');
  const canvas = document.getElementById('selCanvas');
  const w = Math.abs(ex - sx);
  const h = Math.abs(ey - sy);
  
  if(w < 10 || h < 10) {
    setStatus('❌ Lütfen daha büyük bir alan seçin');
    setTimeout(()=>setStatus(''),2000);
    return;
  }
  
  const scaleX = img.naturalWidth / img.offsetWidth;
  const scaleY = img.naturalHeight / img.offsetHeight;
  const cropX = Math.round(Math.min(sx, ex) * scaleX);
  const cropY = Math.round(Math.min(sy, ey) * scaleY);
  const cropW = Math.round(w * scaleX);
  const cropH = Math.round(h * scaleY);
  
  const src = new Image();
  src.src = imageDataUrl;
  src.onload = () => {
    const c = document.createElement('canvas');
    c.width = cropW;
    c.height = cropH;
    c.getContext('2d').drawImage(src, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
    const cropped = c.toDataURL('image/jpeg', 0.95);
    
    if(isSafari){
      const imgEl = document.getElementById('ocrImg');
      imgEl.src = cropped;
      disableAreaSelection();
      document.getElementById('hint').textContent = 'Görsele uzun bas → metni seç';
      setStatus('📱 Seçili alana uzun basın ve "Metni Seç" seçeneğini kullanın');
      setTimeout(()=>setStatus(''),3000);
    } else {
      runTesseract(cropped);
    }
  };
}

/* ── Tesseract OCR ── */
function setStatus(msg){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function runTesseract(dataUrl){
  setStatus('⏳ OCR motoru hazırlanıyor...');
  try{
    if(!window.Tesseract){
      setStatus('⏳ İlk kez yükleniyor (15MB), lütfen bekleyin...');
      await new Promise((res,rej)=>{
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = res;
        s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    setStatus('⏳ Metin tanınıyor...');
    const result = await Tesseract.recognize(dataUrl, 'tur+eng', { logger: () => {} });
    const text = result.data.text.trim();
    document.getElementById('ocrText').value = text || '(Metin bulunamadı)';
    document.getElementById('imgwrap').style.display = 'none';
    document.getElementById('textwrap').style.display = 'flex';
    setStatus('✅ Tarama tamamlandı!');
    setTimeout(()=>setStatus(''),2000);
  } catch(err){
    setStatus('❌ Hata: ' + err.message);
  }
}

function copyText(){
  const t = document.getElementById('ocrText');
  t.select();
  navigator.clipboard.writeText(t.value).catch(() => document.execCommand('copy'));
  setStatus('✓ Kopyalandı!');
  setTimeout(()=>setStatus(''),2000);
}
</script>
</body>
</html>
