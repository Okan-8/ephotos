<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Übergame · Tinder-style German Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background: #063970;
            color: white;
            padding: 22px 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; letter-spacing: -0.5px; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .content {
            padding: 24px 20px;
        }

        /* Screens */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            color: #063970;
        }

        /* SWIPE CARD */
        .swipe-zone {
            position: relative;
            touch-action: pan-y pinch-zoom;
            margin-bottom: 20px;
        }
        .flashcard {
            background: linear-gradient(145deg, #063970, #04284e);
            border-radius: 36px;
            padding: 44px 20px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            position: relative;
            cursor: pointer;
            transition: transform 0.05s ease;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .flashcard:active {
            transform: scale(0.99);
        }
        .speak-icon {
            position: absolute;
            top: 18px;
            left: 18px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            width: 46px;
            height: 46px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 15;
            transition: 0.15s;
        }
        .speak-icon:active { background: rgba(0,0,0,0.7); transform: scale(0.94);}
        .card-front {
            font-size: 34px;
            font-weight: 800;
            word-break: break-word;
            line-height: 1.3;
            margin-bottom: 12px;
            max-width: 100%;
        }
        .card-translation {
            font-size: 27px;
            background: rgba(255,255,255,0.2);
            padding: 12px 22px;
            border-radius: 60px;
            font-weight: 600;
            margin-top: 8px;
        }
        .pronunciation-hint {
            font-size: 16px;
            opacity: 0.8;
            font-style: italic;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        .card-badge {
            position: absolute;
            bottom: 16px;
            right: 18px;
            background: rgba(0,0,0,0.45);
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .swipe-instruction {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 10px 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin: 15px 0 12px;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
            margin: 12px 0 16px;
        }
        .swipe-action {
            flex: 1;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 16px;
            border: none;
            background: #f1f5f9;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swipe-action.left { background: #fee2e2; color: #991b1b; }
        .swipe-action.right { background: #dcfce7; color: #166534; }
        .swipe-action:active { transform: scale(0.96);}
        .reset-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .reset-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            background: #e9ecef;
            font-size: 14px;
        }
        button { cursor: pointer; }
        .btn-primary { background: #063970; color: white; width: 100%; padding: 14px; border-radius: 60px; font-weight: 700; border: none; margin-top: 6px;}

        select, input { border-radius: 60px; padding: 12px 16px; border: 1.5px solid #d4dfed; width: 100%; font-size: 15px; margin-top: 6px; margin-bottom: 16px; }
        .radio-group { display: flex; gap: 16px; margin: 8px 0 16px; }
        .radio-group label { background: #eef2ff; padding: 8px 20px; border-radius: 40px; font-weight: 500; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; margin: 12px 0; }

        .login-card { max-width: 300px; margin: 20px auto; text-align: center; }
        .error-msg { color: #c62828; background: #ffebee; padding: 8px; border-radius: 30px; font-size: 12px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>🃏 Übergame</h1>
        <p>swipe | learn | repeat</p>
    </div>

    <!-- LOGIN SCREEN (admin) -->
    <div id="loginScreen" class="screen">
        <div class="content">
            <div class="login-card">
                <h3 style="color:#063970;">🔐 Admin Login</h3>
                <input type="text" id="adminUsername" placeholder="Username" style="margin-top:16px;">
                <input type="password" id="adminPassword" placeholder="Password">
                <button id="doAdminLogin" class="btn-primary">Login</button>
                <button id="cancelAdmin" style="background:#e2e8f0; margin-top:8px;" class="btn-primary">Cancel</button>
                <div id="loginErrorMsg" class="error-msg">Wrong credentials</div>
            </div>
        </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setupScreen" class="screen active">
        <div class="content">
            <label style="font-weight:700;">📚 Word Group</label>
            <select id="groupSelect"></select>

            <label style="font-weight:700;">🔄 Direction</label>
            <div class="radio-group">
                <label><input type="radio" name="direction" value="de-en" checked> DE → EN</label>
                <label><input type="radio" name="direction" value="en-de"> EN → DE</label>
            </div>

            <label class="checkbox-label">
                <input type="checkbox" id="showPronCheckbox"> 🔊 Show pronunciation
            </label>

            <div id="adminExtraSettings" style="display:none; background:#f8fafc; padding:12px; border-radius:28px; margin:12px 0;">
                <label class="checkbox-label">
                    <input type="checkbox" id="mixedModeCheck" checked> 🎲 Mixed mode (shuffle deck)
                </label>
            </div>

            <button id="startSwipeBtn" class="btn-primary">✨ Start swiping ✨</button>
            <button id="grammarNotesBtn" style="background:#e9ecef; margin-top:12px;" class="btn-primary">📖 Grammar notes</button>
            <div id="adminLogoutDiv" style="display:none; margin-top:12px;">
                <button id="logoutAdminBtn" style="background:#f1f5f9;">🚪 Logout</button>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN (SWIPE) -->
    <div id="gameScreen" class="screen">
        <div class="content">
            <div class="stats-row">
                <span class="badge" id="remainingCount">📇 0 cards</span>
                <span class="badge" id="directionBadge">DE → EN</span>
            </div>

            <div class="swipe-zone" id="swipeZone">
                <div class="flashcard" id="flashcard">
                    <div class="speak-icon" id="speakBtn">🔊</div>
                    <div class="card-front" id="frontWord">Tap start</div>
                    <div id="answerArea" style="display: none;">
                        <div class="card-translation" id="backWord"></div>
                    </div>
                    <div class="pronunciation-hint" id="pronounceArea"></div>
                    <div class="card-badge" id="badgeHint">👇 tap to reveal</div>
                </div>
            </div>

            <div class="swipe-instruction">
                ⬅️ LEFT swipe = practice again later &nbsp;&nbsp;|&nbsp;&nbsp; ➡️ RIGHT swipe = learned ✓
            </div>

            <div class="action-buttons">
                <button class="swipe-action left" id="leftActionBtn">↩️ Needs practice</button>
                <button class="swipe-action right" id="rightActionBtn">✔️ Learned</button>
            </div>

            <div class="reset-group">
                <button id="backToSetupBtn">📋 Change group</button>
                <button id="resetDeckBtn">🔄 Reset deck</button>
            </div>
        </div>
    </div>

    <!-- GRAMMAR PANEL (simple) -->
    <div id="grammarPanel" style="display:none; background:white; border-top:2px solid #e2e8f0; padding:20px;">
        <h3 style="color:#063970;">📘 Grammar & references</h3>
        <div id="grammarContent"></div>
        <button id="closeGrammarPanel" style="margin-top:16px; width:100%; background:#e9ecef; padding:12px; border-radius:40px;">← Back to setup</button>
    </div>
</div>

<script>
    // --------------------- VOCABULARY (compact but fully working) ---------------------
    const WORDS_DATA = [
        {group:"Exclamations", german:"Hilfe!", english:"Help!", pronunciation:"hil-fe"},
        {group:"Exclamations", german:"Vorsicht!", english:"Careful!", pronunciation:"for-ziht"},
        {group:"Greetings", german:"Guten Morgen!", english:"Good morning!", pronunciation:"gu-tın mor-gen"},
        {group:"Greetings", german:"Ich heiße _.", english:"My name is _.", pronunciation:"ih hay-se"},
        {group:"Feelings", german:"Ich habe Hunger.", english:"I'm hungry.", pronunciation:"ih haa-be hun-ger"},
        {group:"Feelings", german:"Ich liebe dich.", english:"I love you.", pronunciation:"ih lii-be dih"},
        {group:"Daily", german:"Wie viel kostet das?", english:"How much does that cost?", pronunciation:"vii fiil kos-tet das"},
        {group:"Daily", german:"Ich verstehe dich nicht.", english:"I don't understand you.", pronunciation:"ih fer-ştee-e dih niht"},
        {group:"Time", german:"Wie spät ist es?", english:"What time is it?", pronunciation:"vii şpeet ist es?"},
        {group:"Time", german:"Es ist zehn Uhr.", english:"It is ten o'clock.", pronunciation:"es ist tseen uur"},
        {group:"Adjective", german:"groß", english:"big / tall", pronunciation:"groos"},
        {group:"Noun", german:"das Buch", english:"the book", pronunciation:"das buuh"},
        {group:"Days", german:"der Montag", english:"Monday", pronunciation:"deyr mo:n-tag"},
        {group:"Verb", german:"sprechen", english:"to speak", pronunciation:"şpre-hen"},
        {group:"Adverb", german:"heute", english:"today", pronunciation:"hoy-te"},
        {group:"Numbers", german:"eins", english:"one", pronunciation:"aynts"},
        {group:"Pronoun", german:"Ich bin", english:"I am", pronunciation:"ih bin"}
    ];

    // grammar fake notes
    const GRAMMAR_NOTES = [{title:"Basic Word Order", content:"Verb always second position in main clause."},{title:"Nominative Case", content:"Subject uses der/die/das/..."}];
    const REFERENCE_TABLES = [{title:"Personal Pronouns", data:[["ich","I","ikh"],["du","you","du"],["er","he","er"]]}];

    // ---------- GLOBAL STATE ----------
    let currentDeck = [];          // remaining cards (array of objects)
    let currentCard = null;
    let showingAnswer = false;
    let showPronunciation = false;
    let direction = "de-en";
    let isAdmin = false;
    let mixedMode = true;
    let selectedGroup = "All";

    // DOM
    const setupScreen = document.getElementById('setupScreen');
    const gameScreen = document.getElementById('gameScreen');
    const loginScreen = document.getElementById('loginScreen');
    const grammarPanel = document.getElementById('grammarPanel');
    const frontWordDiv = document.getElementById('frontWord');
    const answerArea = document.getElementById('answerArea');
    const backWordSpan = document.getElementById('backWord');
    const pronounceSpan = document.getElementById('pronounceArea');
    const remainingSpan = document.getElementById('remainingCount');
    const directionBadge = document.getElementById('directionBadge');
    const badgeHint = document.getElementById('badgeHint');

    // Helper: shuffle
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Build deck from current settings
    function buildDeck() {
        let filtered = WORDS_DATA.filter(w => selectedGroup === "All" ? true : w.group === selectedGroup);
        if (filtered.length === 0) return [];
        const shouldShuffle = isAdmin ? mixedMode : true;
        const copy = [...filtered];
        return shouldShuffle ? shuffleArray(copy) : copy;
    }

    function getFront(w) { return direction === "de-en" ? w.german : w.english; }
    function getBack(w) { return direction === "de-en" ? w.english : w.german; }

    function updateCardUI() {
        if (!currentCard) return;
        const front = getFront(currentCard);
        const back = getBack(currentCard);
        if (!showingAnswer) {
            frontWordDiv.style.display = "block";
            frontWordDiv.innerText = front;
            answerArea.style.display = "none";
        } else {
            frontWordDiv.style.display = "none";
            answerArea.style.display = "block";
            backWordSpan.innerText = back;
        }
        // pronunciation
        if (showPronunciation && currentCard.pronunciation) {
            pronounceSpan.innerText = `[${currentCard.pronunciation}]`;
            pronounceSpan.style.display = "block";
        } else {
            pronounceSpan.innerText = "";
            pronounceSpan.style.display = "none";
        }
        badgeHint.innerText = showingAnswer ? "👆 tap to hide · swipe to continue" : "👇 tap to reveal answer";
        directionBadge.innerText = direction === "de-en" ? "🇩🇪 → 🇬🇧" : "🇬🇧 → 🇩🇪";
    }

    function loadNextCard() {
        if (currentDeck.length === 0) {
            // Game finished
            frontWordDiv.style.display = "block";
            frontWordDiv.innerText = "🎉🎊 PERFEKT! 🎊🎉\nAll words mastered!";
            answerArea.style.display = "none";
            pronounceSpan.innerText = "";
            remainingSpan.innerText = "⭐ Complete! 0 cards";
            currentCard = null;
            return;
        }
        showingAnswer = false;
        currentCard = currentDeck[0];
        updateCardUI();
        updateRemainingUI();
    }

    function updateRemainingUI() {
        remainingSpan.innerText = `📚 ${currentDeck.length} card${currentDeck.length !== 1 ? 's' : ''} left`;
    }

    // Swipe left: move to end (practice later)
    function swipeLeft() {
        if (!currentCard || currentDeck.length === 0) return;
        const moved = currentDeck.shift();
        currentDeck.push(moved);
        loadNextCard();
    }

    // Swipe right: remove permanently (learned)
    function swipeRight() {
        if (!currentCard || currentDeck.length === 0) return;
        currentDeck.shift();   // discard current
        loadNextCard();
    }

    function toggleAnswer() {
        if (!currentCard || currentDeck.length === 0) return;
        showingAnswer = !showingAnswer;
        updateCardUI();
    }

    function speakCurrentWord() {
        if (!currentCard) return;
        const text = direction === "de-en" ? currentCard.german : currentCard.english;
        const lang = direction === "de-en" ? "de-DE" : "en-US";
        const synth = window.speechSynthesis;
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.85;
        setTimeout(() => synth.speak(utterance), 30);
    }

    // Start game from setup values
    function startGame() {
        direction = document.querySelector('input[name="direction"]:checked').value;
        showPronunciation = document.getElementById('showPronCheckbox').checked;
        if (isAdmin) {
            mixedMode = document.getElementById('mixedModeCheck').checked;
        }
        currentDeck = buildDeck();
        if (currentDeck.length === 0) {
            alert("⚠️ No words in this group. Please pick another group.");
            return;
        }
        showingAnswer = false;
        loadNextCard();
        showScreen('gameScreen');
    }

    function resetDeck() {
        currentDeck = buildDeck();
        if (currentDeck.length === 0) {
            alert("No words available after reset.");
            return;
        }
        showingAnswer = false;
        loadNextCard();
    }

    // Screen management
    function showScreen(screenId) {
        setupScreen.classList.remove('active');
        gameScreen.classList.remove('active');
        loginScreen.classList.remove('active');
        grammarPanel.style.display = 'none';
        if (screenId === 'setup') setupScreen.classList.add('active');
        else if (screenId === 'game') gameScreen.classList.add('active');
        else if (screenId === 'login') loginScreen.classList.add('active');
    }

    // Populate group dropdown
    function populateGroups() {
        const groupsSet = new Set();
        WORDS_DATA.forEach(w => { if (w.group) groupsSet.add(w.group); });
        const select = document.getElementById('groupSelect');
        select.innerHTML = '<option value="All">All</option>';
        Array.from(groupsSet).sort().forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            select.appendChild(opt);
        });
        select.addEventListener('change', (e) => { selectedGroup = e.target.value; });
    }

    // Grammar panel filler
    function showGrammarPanel() {
        let html = '<div class="grammar-note"><strong>📌 Quick German notes</strong><p>Verb second rule, nominative case, basic sentence structure.</p></div>';
        if (GRAMMAR_NOTES) GRAMMAR_NOTES.forEach(g => {
            html += `<div class="grammar-note"><h4>${g.title}</h4><p>${g.content}</p></div>`;
        });
        if (REFERENCE_TABLES) {
            REFERENCE_TABLES.forEach(t => {
                html += `<div><h4>${t.title}</h4><table style="width:100%; border-collapse:collapse;">`;
                html += `<tr><th>German</th><th>English</th><th>Pron.</th></tr>`;
                t.data.forEach(row => {
                    html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td></tr>`;
                });
                html += `</table></div>`;
            });
        }
        document.getElementById('grammarContent').innerHTML = html;
        grammarPanel.style.display = 'block';
        setupScreen.classList.remove('active');
        gameScreen.classList.remove('active');
    }

    // ----- ADMIN LOGIC -----
    function initAdmin() {
        const loginBtn = document.getElementById('doAdminLogin');
        const cancelBtn = document.getElementById('cancelAdmin');
        const logoutBtn = document.getElementById('logoutAdminBtn');
        const adminExtra = document.getElementById('adminExtraSettings');
        const adminLogoutDiv = document.getElementById('adminLogoutDiv');
        
        loginBtn.onclick = () => {
            const user = document.getElementById('adminUsername').value;
            const pass = document.getElementById('adminPassword').value;
            if (user === 'Patron' && pass === '724.Uber') {
                isAdmin = true;
                adminExtra.style.display = 'block';
                adminLogoutDiv.style.display = 'block';
                document.getElementById('loginErrorMsg').style.display = 'none';
                showScreen('setup');
            } else {
                document.getElementById('loginErrorMsg').style.display = 'block';
            }
        };
        cancelBtn.onclick = () => { showScreen('setup'); };
        logoutBtn.onclick = () => {
            isAdmin = false;
            adminExtra.style.display = 'none';
            adminLogoutDiv.style.display = 'none';
            showScreen('setup');
        };
    }

    // ----- SWIPE DETECTION (fully functional)-----
    function attachSwipeEvents() {
        const zone = document.getElementById('swipeZone');
        let startX = 0;
        zone.addEventListener('touchstart', (e) => {
            startX = e.changedTouches[0].screenX;
        }, { passive: false });
        zone.addEventListener('touchmove', (e) => {
            if (startX) {
                const delta = Math.abs(e.changedTouches[0].screenX - startX);
                if (delta > 15) e.preventDefault();
            }
        }, { passive: false });
        zone.addEventListener('touchend', (e) => {
            if (!startX) return;
            const endX = e.changedTouches[0].screenX;
            const diff = endX - startX;
            if (Math.abs(diff) > 55) {
                if (diff > 0) swipeRight();
                else swipeLeft();
                e.preventDefault();
            }
            startX = 0;
        });
    }

    // Bind all buttons
    function bindButtons() {
        document.getElementById('startSwipeBtn').onclick = () => startGame();
        document.getElementById('backToSetupBtn').onclick = () => showScreen('setup');
        document.getElementById('resetDeckBtn').onclick = () => resetDeck();
        document.getElementById('leftActionBtn').onclick = () => swipeLeft();
        document.getElementById('rightActionBtn').onclick = () => swipeRight();
        document.getElementById('speakBtn').onclick = (e) => { e.stopPropagation(); speakCurrentWord(); };
        document.getElementById('flashcard').onclick = (e) => {
            if (e.target.classList.contains('speak-icon')) return;
            toggleAnswer();
        };
        document.getElementById('grammarNotesBtn').onclick = () => showGrammarPanel();
        document.getElementById('closeGrammarPanel').onclick = () => { grammarPanel.style.display = 'none'; showScreen('setup'); };
        // floating admin button (extra)
        const floatBtn = document.createElement('button');
        floatBtn.innerText = '🔐';
        floatBtn.style.position = 'fixed';
        floatBtn.style.bottom = '20px';
        floatBtn.style.right = '20px';
        floatBtn.style.backgroundColor = '#063970';
        floatBtn.style.color = 'white';
        floatBtn.style.border = 'none';
        floatBtn.style.borderRadius = '50px';
        floatBtn.style.width = '54px';
        floatBtn.style.height = '54px';
        floatBtn.style.fontSize = '26px';
        floatBtn.style.boxShadow = '0 4px 12px black';
        floatBtn.style.zIndex = '999';
        floatBtn.style.cursor = 'pointer';
        floatBtn.onclick = () => showScreen('login');
        document.body.appendChild(floatBtn);
    }

    // INIT
    function init() {
        populateGroups();
        initAdmin();
        bindButtons();
        attachSwipeEvents();
        showScreen('setup');
        selectedGroup = 'All';
        document.getElementById('groupSelect').value = 'All';
        directionBadge.innerText = "DE → EN";
    }
    init();
</script>
</body>
</html>
